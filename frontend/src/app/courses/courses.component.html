
<div *ngIf="1" [@slideInUpOnEnter] class="category-selection">
  <i (click)="left()" class="fa-solid fa-arrow-left"></i>
  <span  id="category" class="category">{{categoryList[currentValue]}}</span>
  <i (click)="right()" class="fa-solid fa-arrow-right"></i>

</div>

<div *ngIf="animationState" [@slideInUpOnEnter] class="courses-container" id="courses-container">
  <app-course-box *ngFor="let course of coursesList"
    [title] = "course.title"
    [image]="course.image"
    [description]="course.description"
  ></app-course-box>

</div>
